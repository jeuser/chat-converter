<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅 백업 변환기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { display: flex; gap: 20px; }
        .box { flex: 1; display: flex; flex-direction: column; }
        textarea { width: 100%; height: 500px; padding: 15px; font-size: 15px; border: 1px solid #ccc; border-radius: 8px; resize: none; box-sizing: border-box; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; margin: 0 0 20px 0; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px; width: 150px; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <h2>채팅 로그 변환기</h2>
    <button onclick="convertText()">변환하기</button>
    <div class="container">
        <div class="box">
            <h3>원본 텍스트</h3>
            <textarea id="inputText" placeholder="여기에 백업한 텍스트를 붙여넣으세요..."></textarea>
        </div>
        <div class="box">
            <h3>변환된 텍스트</h3>
            <textarea id="outputText" readonly></textarea>
        </div>
    </div>

    <script>
        function convertText() {
            const input = document.getElementById('inputText').value;
            const lines = input.split('\n'); // 텍스트를 줄 단위로 쪼갬
            const output = [];
            let inBlock = false; // 현재 [이름]: 블록 아래를 읽고 있는지 여부
        
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const trimmed = line.trim();
        
                // 1. [이름]: 형태의 줄인지 확인 (새로운 캐릭터의 턴 시작)
                if (/^\[.+?\]:/.test(trimmed)) {
                    inBlock = true;
                    output.push(line);
                    continue;
                }
        
                // 2. 캐릭터의 턴 내부일 때의 처리
                if (inBlock) {
                    if (trimmed === '') {
                        // 빈 줄(줄바꿈)은 건드리지 않고 그대로 유지!
                        output.push(line);
                    } else if (trimmed.startsWith('"') && trimmed.endsWith('"')) {
                        // 큰따옴표로 둘러싸인 대사: 양끝의 큰따옴표만 깔끔하게 제거
                        const dialog = trimmed.substring(1, trimmed.length - 1);
                        output.push(line.replace(trimmed, dialog));
                    } else {
                        // 그 외의 모든 텍스트(서술): 양옆에 * 추가
                        output.push(line.replace(trimmed, `*${trimmed}*`));
                    }
                } else {
                    // [이름]: 블록 밖의 텍스트(예: 일반 안내문 등)는 그대로 둠
                    output.push(line);
                }
            }
        
            // 배열에 모인 줄들을 다시 줄바꿈으로 연결해서 출력
            document.getElementById('outputText').value = output.join('\n');
        }
    </script>
</body>
</html>
