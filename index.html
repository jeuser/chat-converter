<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅 백업 변환기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f9f9f9; }
        .btn-container { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; transition: background-color 0.2s; }
        .btn-convert { background-color: #4CAF50; color: white; }
        .btn-convert:hover { background-color: #45a049; }
        .btn-download { background-color: #008CBA; color: white; }
        .btn-download:hover { background-color: #007B9A; }
        .container { display: flex; gap: 20px; }
        .box { flex: 1; display: flex; flex-direction: column; }
        textarea { width: 100%; height: 500px; padding: 15px; font-size: 15px; border: 1px solid #ccc; border-radius: 8px; resize: none; box-sizing: border-box; }
        h2 { margin-top: 0; }
        h3 { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>채팅 로그 변환기</h2>
    <div class="btn-container">
        <button class="btn-convert" onclick="convertText()">변환하기</button>
        <button class="btn-download" onclick="downloadTxt()">TXT 파일로 저장</button>
    </div>
    <div class="container">
        <div class="box">
            <h3>원본 텍스트</h3>
            <textarea id="inputText" placeholder="여기에 백업한 텍스트를 붙여넣으세요..."></textarea>
        </div>
        <div class="box">
            <h3>변환된 텍스트</h3>
            <textarea id="outputText" readonly></textarea>
        </div>
    </div>

    <script>
        function convertText() {
            const input = document.getElementById('inputText').value;
            const lines = input.split('\n');
            const output = [];
            
            let inBlock = false; // [이름]: 아래의 텍스트인지 확인
            let inQuote = false; // 현재 여러 줄 대사(" ") 내부에 있는지 확인

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const trimmed = line.trim();

                // 1. [이름]: 형태를 만나면 캐릭터 블록 시작, 대사 상태는 초기화
                if (/^\[.+?\]:/.test(trimmed)) {
                    inBlock = true;
                    inQuote = false; 
                    output.push(line);
                    continue;
                }

                if (inBlock) {
                    if (trimmed === '') {
                        // 빈 줄은 대사 중이든 서술 중이든 그대로 유지
                        output.push(line);
                    } 
                    // 2-1. 여러 줄 대사의 '첫 줄' (따옴표로 시작하지만 끝나진 않음)
                    else if (!inQuote && trimmed.startsWith('"') && !trimmed.endsWith('"')) {
                        inQuote = true; // 대사 상태 ON
                        output.push(line.replace(trimmed, trimmed.substring(1))); 
                    } 
                    // 2-2. 여러 줄 대사의 '마지막 줄' (따옴표로 끝남)
                    else if (inQuote && trimmed.endsWith('"')) {
                        inQuote = false; // 대사 상태 OFF
                        output.push(line.replace(trimmed, trimmed.substring(0, trimmed.length - 1)));
                    } 
                    // 2-3. 여러 줄 대사의 '중간 줄' (따옴표 없이 텍스트만 있음)
                    else if (inQuote) {
                        output.push(line); 
                    } 
                    // 2-4. 딱 한 줄짜리 대사 (따옴표로 시작해서 따옴표로 끝남)
                    else if (!inQuote && trimmed.startsWith('"') && trimmed.endsWith('"')) {
                        const dialog = trimmed.substring(1, trimmed.length - 1);
                        output.push(line.replace(trimmed, dialog));
                    } 
                    // 2-5. 그 외의 모든 경우는 '서술'로 간주
                    else {
                        output.push(line.replace(trimmed, `*${trimmed}*`));
                    }
                } else {
                    // 블록 밖의 문장들은 그대로 통과
                    output.push(line);
                }
            }

            document.getElementById('outputText').value = output.join('\n');
        }

        // TXT 다운로드 로직은 동일하게 유지
        function downloadTxt() {
            const text = document.getElementById('outputText').value;
            if (!text.trim()) {
                alert('변환된 텍스트가 없습니다. 먼저 변환하기 버튼을 눌러주세요.');
                return;
            }
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            
            link.href = url;
            link.download = `converted_chat_${year}${month}${date}.txt`;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
